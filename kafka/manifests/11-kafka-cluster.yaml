# ============================================================
# Kafka cluster (KRaft mode, references the node pools above)
# 3 controllers + 3 brokers, replication factor 3, min ISR 2.
# ============================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: events-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.1
    metadataVersion: 4.1-IV1
    listeners:
      # Plaintext listener for in-cluster clients (n8n, Trino, producers)
      - name: plain
        port: 9092
        type: internal
        tls: false
      # TLS listener (optional, for clients that want encryption)
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      # All replication factors = 3 (matches 3 brokers), min ISR = 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # Allow topic auto-create for convenience (producers can create on first write)
      auto.create.topics.enable: true
      # Sensible retention default: 7 days
      log.retention.hours: 168
  # Entity Operator manages KafkaTopic and KafkaUser custom resources
  entityOperator:
    topicOperator: {}
    userOperator: {}
