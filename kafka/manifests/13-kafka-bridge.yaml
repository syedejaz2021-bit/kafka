# ============================================================
# Strimzi Kafka Bridge — HTTP REST gateway to Kafka.
# Produce/consume messages over plain HTTP, no Kafka client needed.
#
# The operator turns this CR into a Deployment + Service.
# Service: events-kafka-bridge-bridge-service.kafka.svc.cluster.local:8080
# ============================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaBridge
metadata:
  name: events-kafka-bridge
  namespace: kafka
spec:
  replicas: 1
  bootstrapServers: events-kafka-kafka-bootstrap:9092
  http:
    port: 8080
    # CORS — allow browser-based clients (the dashboard, n8n web UI, etc.)
    cors:
      allowedOrigins:
        - "*"
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
  # Consumer/producer defaults
  consumer:
    config:
      auto.offset.reset: earliest
  producer:
    config:
      acks: "1"
  resources:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi
