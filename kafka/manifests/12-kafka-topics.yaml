# ============================================================
# KafkaTopic resources — declaratively managed by the Topic Operator.
# These match the log-analysis theme of the Trino stack.
# ============================================================
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: log-events
  namespace: kafka
  labels:
    strimzi.io/cluster: events-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "604800000"      # 7 days
    segment.bytes: "1073741824"    # 1 GB
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: deployments
  namespace: kafka
  labels:
    strimzi.io/cluster: events-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "2592000000"     # 30 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: incidents
  namespace: kafka
  labels:
    strimzi.io/cluster: events-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "2592000000"     # 30 days
    cleanup.policy: delete
