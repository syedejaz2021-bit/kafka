# ============================================================
# Dual-role Kafka node pool, SMALL footprint for limited Longhorn space.
#
# - 3 dual-role nodes (controller + broker combined)
# - 8Gi volumes each = 24Gi logical
# - Longhorn replica count for these volumes set to 1 (via StorageClass below)
#   so 24Gi logical = 24Gi physical (NOT 72Gi with default 3x replication)
#
# Kafka already replicates data across its 3 brokers (replication.factor=3),
# so having Longhorn ALSO make 3 copies is redundant. Longhorn replica=1 is
# the correct choice for Kafka — Kafka handles its own redundancy.
# ============================================================
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: events-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 8Gi
        kraftMetadata: shared
        deleteClaim: false
        class: longhorn-kafka     # custom StorageClass with replica=1 (defined below)
  resources:
    requests:
      cpu: "300m"
      memory: 768Mi
    limits:
      cpu: "1500m"
      memory: 1536Mi
  jvmOptions:
    -Xms: 768m
    -Xmx: 768m
  template:
    pod:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              strimzi.io/pool-name: dual-role
